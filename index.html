<button onclick="sendData()">
送信
</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbydIjRKFvXUQQT2Ey-QRJxtu1VXj5xQ2_Bm1jsh_5vy3yT2iz_KSSl02LS2TOWfOnK-/exec";

async function sendData() {

  const data = {
    sheet: "tickets",
    startTime: "600",
    endTime : "750"
  };

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  const json = await res.json();

  console.log(json);
}
</script>
