<button onclick="sendData()">
送信
</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx50KtM_1JDbiewlBPrRqPV93KxA5ipWd3whnzw_PO5/dev";

async function sendData() {

  const data = {
    sheet: "tickets",
    startTime: "600",
    endTime : "750"
  };

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  const json = await res.json();

  console.log(json);
}
</script>
