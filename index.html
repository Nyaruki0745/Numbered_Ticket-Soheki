<button onclick="sendData()">
送信
</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxQ7G8cRwihzpJvXkxW6ePVQ-K1JOIKZ-Fu_Ar3sMGSl-Rrekt94_gn67R1mjQ-RE_G6A/exec";

async function sendData() {

  const data = {
    sheet: "tickets",
    startTime: "600",
    endTime : "750"
  };

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  const json = await res.json();

  console.log(json);
}
</script>
