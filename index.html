<button onclick="sendData()">
送信
</button>

<script>
const API_URL = "https://script.google.com/a/macros/gl.pen-kanagawa.ed.jp/s/AKfycbw41-UOfmudAW_ySHGM46di9pghE6iz8PC4RRjyx46UrsfHuitkG6mmCkzTYA0fIC33/exec";

async function sendData() {

  const data = {
    sheet: "tickets",
    startTime: "600",
    endTime : "750"
  };

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  const json = await res.json();

  console.log(json);
}
</script>
