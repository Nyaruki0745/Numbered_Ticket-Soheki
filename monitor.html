<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼出モニター</title>
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="css/style.css">
<style>
/* ===== モニター固有スタイル ===== */

body {
  background: #080c14;
  overflow: hidden;
}

#monitor-app {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ヘッダーバー */
#monitor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 2rem;
  border-bottom: 1px solid var(--border);
  background: #0a0f1c;
  flex-shrink: 0;
}
#monitor-header h1 {
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text2);
  text-transform: uppercase;
}
#monitor-clock {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.1em;
}
.monitor-meta {
  display: flex; align-items: center; gap: 1rem;
  font-size: 0.78rem; color: var(--text3);
}
.poll-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text3);
  transition: background 0.3s;
}
.poll-dot.active { background: var(--success); }

/* ===== ログイン（モニター用） ===== */
#monitor-login {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0.5rem;
}
#monitor-login .sub {
  color: var(--text2); font-size: 0.85rem; margin-bottom: 1.5rem;
}
#monitor-login-form {
  display: flex; flex-direction: column; gap: 1rem;
  width: 320px;
}

/* ===== 呼出リスト ===== */
#monitor-body {
  flex: 1;
  padding: 2rem;
  overflow-y: auto;
  display: none;
}
#monitor-body.show { display: block; }

#calling-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.25rem;
}

.call-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem 1.75rem;
  position: relative;
  transition: border-color 0.3s;
}
.call-card.calling {
  border-color: rgba(240,180,41,0.4);
  box-shadow: 0 0 20px rgba(240,180,41,0.08);
}
.call-card.reserved {
  border-color: rgba(79,124,255,0.25);
}

.call-card .call-number {
  font-family: var(--font-mono);
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: 0.06em;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 0.5rem;
}
.call-card.calling .call-number { color: #f0c040; }
.call-card.reserved .call-number { color: #6f9eff; }

.call-card .call-time {
  font-size: 1rem;
  font-family: var(--font-mono);
  color: var(--text2);
  margin-bottom: 0.4rem;
}
.call-card .call-count {
  font-size: 0.82rem;
  color: var(--text3);
}
.call-card .call-status {
  position: absolute;
  top: 1rem; right: 1rem;
}

/* 点滅アニメ（呼出中のみ） */
@keyframes pulse-border {
  0%, 100% { box-shadow: 0 0 0 0 rgba(240,180,41,0); }
  50%       { box-shadow: 0 0 0 6px rgba(240,180,41,0.12); }
}
.call-card.calling { animation: pulse-border 2s ease-in-out infinite; }

/* 空状態 */
#empty-state {
  display: flex;
  flex-direction: column;
  align-items: center; justify-content: center;
  height: 50vh;
  gap: 0.75rem;
  color: var(--text3);
}
#empty-state .icon { font-size: 3rem; opacity: 0.3; }
#empty-state p { font-size: 0.9rem; }

/* シート選択バー（ログイン後） */
#sheet-selector-bar {
  display: none;
  padding: 0.5rem 2rem;
  border-bottom: 1px solid var(--border);
  background: #0a0f1c;
  gap: 0.5rem;
  flex-wrap: wrap;
}
#sheet-selector-bar.show {
  display: flex;
}
.sheet-sel-btn {
  padding: 0.3rem 0.9rem;
  border-radius: 999px;
  font-size: 0.8rem; font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  transition: all 0.15s;
}
.sheet-sel-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

@media (prefers-reduced-motion: reduce) {
  .call-card.calling { animation: none; }
}
</style>
</head>
<body>

<div id="monitor-app">

  <!-- ヘッダー（常時表示） -->
  <div id="monitor-header">
    <h1 id="monitor-title-header">呼出モニター</h1>
    <div id="monitor-clock">--:--:--</div>
    <div class="monitor-meta">
      <div class="poll-dot" id="poll-dot"></div>
      <span id="poll-status">待機中</span>
    </div>
  </div>

  <!-- シート選択バー（ログイン後） -->
  <div id="sheet-selector-bar">
    <!-- JSで生成 -->
  </div>

  <!-- ログイン画面 -->
  <div id="monitor-login">
    <div style="font-size:2rem;">📺</div>
    <h2 id="monitor-title-login">呼出モニター</h2>
    <p class="sub">シートとパスワードを選択してください</p>

    <div id="monitor-login-form">
      <div class="field">
        <label for="mon-sheet-select">シート選択</label>
        <select id="mon-sheet-select"></select>
      </div>
      <div class="field">
        <label for="mon-password">パスワード（4桁）</label>
        <input type="password" id="mon-password" maxlength="4" inputmode="numeric"
          placeholder="••••">
      </div>
      <button class="btn btn-primary" id="mon-login-btn">モニターを開始</button>
      <p id="mon-login-error" class="text-danger" style="font-size:0.83rem;text-align:center;min-height:1.2em;"></p>
    </div>
  </div>

  <!-- 呼出リスト本体 -->
  <div id="monitor-body">
    <div id="calling-list">
      <!-- JSで生成 -->
    </div>
  </div>

</div>

<!-- トースト -->
<div id="toast-container"></div>

<script src="config.js"></script>
<script src="js/api.js"></script>

<script>
// ============================================================
// 初期化
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  document.title = CONFIG.MONITOR_TITLE;
  document.getElementById('monitor-title-header').textContent = CONFIG.MONITOR_TITLE;
  document.getElementById('monitor-title-login').textContent = CONFIG.MONITOR_TITLE;

  buildSheetSelect();
  startClock();
});

function buildSheetSelect() {
  const sel = document.getElementById('mon-sheet-select');
  CONFIG.SHEETS.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = s.label;
    sel.appendChild(opt);
  });
}

// ============================================================
// 時計
// ============================================================
function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('monitor-clock').textContent =
      now.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
  }
  tick();
  setInterval(tick, 1000);
}

// ============================================================
// ログイン
// ============================================================
document.getElementById('mon-login-btn').addEventListener('click', async () => {
  const idx   = parseInt(document.getElementById('mon-sheet-select').value, 10);
  const pw    = document.getElementById('mon-password').value;
  const sheet = CONFIG.SHEETS[idx];
  const errEl = document.getElementById('mon-login-error');
  errEl.textContent = '';

  // PW照合はGAS側のスクリプトプロパティで行う（フロントにPWは保持しない）
  try {
    await API.auth(sheet.sheetName, pw);
    API.setSession(sheet, pw);  // PWはメモリのみ
    startMonitor();
  } catch(e) {
    errEl.textContent = e.message.includes('認証失敗') || e.message.includes('正しくありません')
      ? 'パスワードが違います'
      : 'サーバーエラー: ' + e.message;
  }
});

// Enterキーでログイン
document.getElementById('mon-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('mon-login-btn').click();
});

// ============================================================
// モニター開始
// ============================================================
let pollTimer = null;
let activeSheetIdx = 0;
let activeSessions = {}; // sheetIdx -> { sheetName, password }

function startMonitor() {
  document.getElementById('monitor-login').style.display = 'none';
  document.getElementById('monitor-body').classList.add('show');

  // 全シートのsession情報を保存（複数シートポーリング対応）
  CONFIG.SHEETS.forEach((s, i) => {
    activeSessions[i] = s;
  });

  buildSheetSelectorBar();

  // アクティブシートを現在のセッションに合わせる
  activeSheetIdx = CONFIG.SHEETS.findIndex(s => s.sheetName === API.getSession().sheetName);
  if (activeSheetIdx < 0) activeSheetIdx = 0;
  updateSheetSelectorUI();

  fetchAndRender();
  pollTimer = setInterval(fetchAndRender, CONFIG.POLL_INTERVAL_MS);
}

function buildSheetSelectorBar() {
  const bar = document.getElementById('sheet-selector-bar');
  bar.innerHTML = '';
  CONFIG.SHEETS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'sheet-sel-btn';
    btn.textContent = s.label;
    btn.addEventListener('click', () => {
      activeSheetIdx = i;
      // シート切替時は選択シートのセッションを更新（PWはシート切替ボタンを押さず再ログイン不要）
      updateSheetSelectorUI();
      fetchAndRender();
    });
    btn.id = 'sheetbtn-' + i;
    bar.appendChild(btn);
  });
  bar.classList.add('show');
}

function updateSheetSelectorUI() {
  CONFIG.SHEETS.forEach((_, i) => {
    const btn = document.getElementById('sheetbtn-' + i);
    if (btn) btn.classList.toggle('active', i === activeSheetIdx);
  });
}

// ============================================================
// ポーリング・レンダリング
// ============================================================
async function fetchAndRender() {
  const dot = document.getElementById('poll-dot');
  const status = document.getElementById('poll-status');
  dot.classList.add('active');
  status.textContent = '更新中...';

  try {
    const sheet = CONFIG.SHEETS[activeSheetIdx];
    // getCallingList はセッション内のPWを自動付与（api.js の _enteredPassword を使用）
    const res = await API.getCallingList(sheet.sheetName, API.getSession()?._enteredPassword || '');
    renderCallingList(res.list || []);
    status.textContent = '接続中';
  } catch(e) {
    status.textContent = 'エラー: ' + e.message;
  } finally {
    setTimeout(() => dot.classList.remove('active'), 600);
  }
}

function renderCallingList(list) {
  const container = document.getElementById('calling-list');

  if (list.length === 0) {
    container.innerHTML = `
      <div id="empty-state">
        <div class="icon">🎫</div>
        <p>現在、呼出対象の整理券はありません</p>
      </div>`;
    return;
  }

  // 呼出中を先頭に、次いで予約済（開始時間昇順）
  const sorted = [...list].sort((a, b) => {
    if (a.status === 'calling' && b.status !== 'calling') return -1;
    if (a.status !== 'calling' && b.status === 'calling') return 1;
    return a.startTime.localeCompare(b.startTime);
  });

  container.innerHTML = '';
  sorted.forEach(ticket => {
    const st = CONFIG.STATUSES[ticket.status] || { label: ticket.status, color: '' };
    const card = document.createElement('div');
    card.className = 'call-card ' + ticket.status;
    card.innerHTML = `
      <div class="call-status">
        <span class="badge ${st.color}">${st.label}</span>
      </div>
      <div class="call-number">${ticket.ticketNumber}</div>
      <div class="call-time">${ticket.startTime} 〜 ${ticket.endTime}</div>
      <div class="call-count">${ticket.count}名</div>
    `;
    container.appendChild(card);
  });
}

// ============================================================
// トースト
// ============================================================
function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
</script>

</body>
</html>
